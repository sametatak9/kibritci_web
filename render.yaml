# Render Blueprint — tek servis: kibritci-erp
# Not: Aynı repo için ikinci bir Web Service bağlamayın; çift deploy olur.
services:
  - type: web
    name: kibritci-erp
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/gemini-health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
