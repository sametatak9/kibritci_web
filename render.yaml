# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: kibritci-web
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/gemini-health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
